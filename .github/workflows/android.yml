name: Android CI

on:
  push:
    branches: [ develop, main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ───────────────────────────────────────────────────────────────────
      # Checkout & JDK
      # ───────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ───────────────────────────────────────────────────────────────────
      # Unit tests, Lint, Assemble
      # ───────────────────────────────────────────────────────────────────
      - name: Unit tests + lint + assemble
        run: ./gradlew --stacktrace testDebugUnitTest lintDebug assembleDebug

      # ───────────────────────────────────────────────────────────────────
      # Instrumentation tests (emulator)
      # ───────────────────────────────────────────────────────────────────
      - name: Run instrumented tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          script: ./gradlew connectedDebugAndroidTest

      # ───────────────────────────────────────────────────────────────────
      # JaCoCo merged coverage (unit + instr)
      # ───────────────────────────────────────────────────────────────────
      - name: Generate JaCoCo coverage report
        run: ./gradlew --stacktrace jacocoDebugReport

      # ───────────────────────────────────────────────────────────────────
      # Artifacts
      # ───────────────────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload coverage report (HTML)
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: app/build/reports/jacoco/jacocoDebugReport/html
